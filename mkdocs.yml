site_name: tileon
site_url: https://bluemoon-o2.github.io/tileon/
repo_url: https://github.com/bluemoon-o2/tileon

theme:
  name: material
  logo: assets/tileon-logo.png
  favicon: assets/tileon-logo.png
  language: en

  features:
    - navigation.path
    - navigation.sections
    - navigation.tabs

    - navigation.prune
    - navigation.top

  palette:

    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - i18n:
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            "Getting Started": "快速开始"

  - mkdocstrings:
      handlers:
        python:
          options:
            members_order: source
            group_by_category: false
            signature_crossrefs: true
            show_signature: true
            docstring_section_style: list
            show_root_heading: true
            heading_level: 3
            preload_modules:
              - typing
              - typing_extensions

watch:
  - python/tileon
  - README.md

nav:
  - "Getting Started": "index.md"



extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.smartsymbols
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: bluemoon-o2
      repo: tileon
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - tables

copyright: >
  Copyright &copy; 2026 Tileon Team -
  <a href="#__consent">Change cookie settings</a>

extra:
  alternate:
    - name: English
      link: /tileon/
      lang: en
    - name: 中文
      link: /tileon/zh/
      lang: zh
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject
      - manage
